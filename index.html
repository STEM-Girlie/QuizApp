<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="quiz-container" id="quiz">
      <div class="quiz-header">
        <h2 id="question">Question Text</h2>
        <ul>
          <li>
            <input type="radio" id="a" name="answer" class="answer" value="a" />
            <label id="label_a" for="a">Answer A</label>
          </li>
          <li>
            <input type="radio" id="b" name="answer" class="answer" value="b" />
            <label id="label_b" for="b">Answer B</label>
          </li>
          <li>
            <input type="radio" id="c" name="answer" class="answer" value="c" />
            <label id="label_c" for="c">Answer C</label>
          </li>
          <li>
            <input type="radio" id="d" name="answer" class="answer" value="d" />
            <label id="label_d" for="d">Answer D</label>
          </li>
        </ul>
        <button id="submit">Next Question</button>
      </div>
    </div>
  </body>
</html>
